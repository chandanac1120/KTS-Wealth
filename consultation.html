<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Free Consultation | KTS Wealth</title>

    <link rel="stylesheet" href="consultation.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <img src="Images/consultation-qr.png"
    alt="Scan to Book Free Consultation"
    class="qr-code">

        <h1>Book Free Consultation</h1>
        <p>Fill in your details and our financial advisor will contact you shortly.</p>

        <form>

            <input type="text" placeholder="Full Name" required>

            <input type="tel" placeholder="Phone Number" required>

            <input type="email" placeholder="Email Address">

            <input type="date" required>

            <input type="time" required>

            <textarea placeholder="Message (Optional)"></textarea>

            <button type="submit">Book Consultation</button>

        </form>

    </div>
</div>

</body>
</html>
